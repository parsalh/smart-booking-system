<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBooking - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen font-sans text-gray-900 selection:bg-blue-100">

<input type="hidden" id="calendarEventsData" th:value="${eventsJson}" />

<nav class="bg-white/80 backdrop-blur-md border-b border-gray-200 py-3 px-8 flex justify-between items-center shadow-sm sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <img th:src="@{/images/hua-logo.png}" alt="HUA" class="w-8 h-8 object-contain" />
        <span class="text-lg font-bold tracking-tight text-gray-900">SmartBooking</span>
    </div>
    <div class="flex items-center gap-4">
        <a th:if="${role == 'ADMIN'}" href="/admin/rooms" class="btn-admin shadow-sm">
            <i data-lucide="settings" class="w-4 h-4"></i>
            <span>Admin Panel</span>
        </a>

        <div class="text-right hidden md:block">
            <p class="text-xs font-bold text-gray-900" th:text="${name}">User Name</p>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider" th:text="${email}">user@email.com</p>
        </div>
        <a href="/logout" class="p-2 text-gray-400 hover:text-red-600 transition-colors rounded-full hover:bg-red-50">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </a>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-6 space-y-6">

    <div class="bg-gradient-to-r from-blue-600 to-emerald-600 rounded-3xl p-8 text-white shadow-lg relative overflow-hidden group">
        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-all"></div>
        <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-inner">
                        <svg class="w-7 h-7" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M5 5h6v6H5z"/><path fill="#EA4335" d="M13 5h6v6h-6z"/><path fill="#FBBC04" d="M5 13h6v6H5z"/><path fill="#34A853" d="M13 13h6v6h-6z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase tracking-widest text-white/70 leading-none mb-1">Status</p>
                        <p class="text-sm font-bold">Connected to Google Calendar</p>
                    </div>
                </div>
                <h2 class="text-3xl font-bold mb-1 tracking-tight">Welcome back!</h2>
                <p class="text-white/80 font-medium">You have <span class="text-white font-bold underline decoration-white/30" th:text="${eventCount}">0</span> upcoming meetings</p>
            </div>
            <button class="bg-white flex items-center gap-2 px-8 py-4 rounded-xl font-bold transition-all shadow-xl active:scale-95 group border border-blue-50">
                <i data-lucide="sparkles" class="w-5 h-5 text-blue-600 group-hover:rotate-12 transition-transform"></i>
                <span class="btn-gradient-text">Schedule New Meeting</span>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-3 bg-white/30 backdrop-blur-xl border border-white/50 rounded-3xl p-6 shadow-lg relative overflow-hidden">
            <div id="calendar"></div>
        </div>

        <div class="space-y-6">
            <div class="bg-gradient-to-br from-emerald-500/10 to-blue-500/10 border border-white rounded-3xl p-6 shadow-sm backdrop-blur-sm relative overflow-hidden">
                <h3 class="font-bold mb-4 text-emerald-900 text-xs uppercase tracking-[0.2em]">Quick Actions</h3>
                <div class="space-y-3">
                    <button class="w-full flex items-center gap-3 p-4 border border-white/50 bg-white/40 rounded-2xl hover:bg-white/60 font-semibold transition-all group shadow-sm">
                        <i data-lucide="calendar-days" class="w-5 h-5 text-blue-600 group-hover:scale-110 transition-transform"></i>
                        <span class="text-gray-700 text-sm">View All Bookings</span>
                    </button>
                    <button class="w-full flex items-center gap-3 p-4 border border-white/50 bg-white/40 rounded-2xl hover:bg-white/60 font-semibold transition-all group shadow-sm">
                        <i data-lucide="map-pin" class="w-5 h-5 text-emerald-600 group-hover:scale-110 transition-transform"></i>
                        <span class="text-gray-700 text-sm">Browse Rooms</span>
                    </button>
                </div>
            </div>

            <div class="bg-gradient-to-br from-emerald-500/10 to-blue-500/10 border border-white rounded-3xl p-6 shadow-sm backdrop-blur-sm relative overflow-hidden">
                <h3 class="font-bold mb-4 text-emerald-900 text-xs uppercase tracking-[0.2em]">This Week</h3>
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-xs font-bold text-emerald-800 mb-2">
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> Meetings</span>
                            <span th:text="${eventCount}">12</span>
                        </div>
                        <div class="w-full bg-white/60 rounded-full h-2 shadow-inner">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: 65%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs font-bold text-emerald-800 mb-2">
                            <span class="flex items-center gap-1"><i data-lucide="door-open" class="w-3 h-3"></i> Rooms</span>
                            <span>8</span>
                        </div>
                        <div class="w-full bg-white/60 rounded-full h-2 shadow-inner">
                            <div class="bg-emerald-500 h-2 rounded-full" style="width: 40%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-white transform transition-all">
            <div class="flex justify-between items-start mb-6">
                <div class="p-3 bg-blue-50 rounded-2xl">
                    <i data-lucide="info" class="w-6 h-6 text-blue-600"></i>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
                </button>
            </div>
            <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 mb-2"></h3>
            <div class="space-y-4">
                <div class="flex items-center gap-3 text-gray-600 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <i data-lucide="clock" class="w-4 h-4 text-blue-600"></i>
                    <span id="modalTime" class="text-sm font-semibold"></span>
                </div>
                <div class="flex items-center gap-3 text-gray-600 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <i data-lucide="map-pin" class="w-4 h-4 text-blue-600"></i>
                    <span id="modalLocation" class="text-sm font-semibold"></span>
                </div>
                <div id="modalAmenitiesContainer" class="pt-2 hidden">
                    <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 font-bold">Room Features</p>
                    <div id="modalAmenitiesList" class="flex flex-wrap gap-2">
                    </div>
                </div>
                <div class="pt-2">
                    <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 font-bold">Details</p>
                    <p id="modalDescription" class="text-sm text-gray-600 leading-relaxed"></p>
                </div>
            </div>
            <button onclick="closeModal()" class="w-full mt-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                Close
            </button>
        </div>
    </div>
</main>

<script>
    // noinspection JSUnresolvedReference
    lucide.createIcons();

    function closeModal() {
        document.getElementById('eventModal').classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const eventInput = document.getElementById('calendarEventsData');

        let eventsData = [];
        if (eventInput && eventInput.value) {
            try {
                eventsData = JSON.parse(eventInput.value);
            } catch (e) {
                console.error("JSON Error:", e);
            }
        }

        // noinspection JSUnresolvedReference
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            events: eventsData,
            firstDay: 1,
            height: 730,
            expandRows: true,
            slotDuration: '01:00:00',
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            eventDisplay: 'block',
            eventTimeFormat: { hour: 'numeric', minute: '2-digit', hour12: false },
            eventClassNames: function(arg) {
                // noinspection JSUnresolvedReference
                return [ arg.event.extendedProps.type ? 'event-' + arg.event.extendedProps.type.toLowerCase() : 'event-other' ];
            },

            eventClick: function(info) {

                // noinspection JSUnresolvedReference
                const props = info.event.extendedProps;

                document.getElementById('modalTitle').innerText = info.event.title || 'Untitled Event';

                const startTime = info.event.start ? info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                const endTime = info.event.end ? info.event.end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                document.getElementById('modalTime').innerText = endTime ? `${startTime} - ${endTime}` : startTime;

                document.getElementById('modalLocation').innerText = props['location'] || props['room'] || 'No location specified';
                document.getElementById('modalDescription').innerText = props.description || 'No details available.';

                const list = document.getElementById('modalAmenitiesList');
                const container = document.getElementById('modalAmenitiesContainer');
                list.innerHTML = '';

                const amenities = props['roomAmenities'];

                if (amenities && amenities.length > 0) {
                    container.classList.remove('hidden');
                    amenities.forEach(amenity => {
                        const span = document.createElement('span');
                        span.className = "flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold border border-blue-100";
                        span.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> ${amenity}`;
                        list.appendChild(span);
                    });
                } else {
                    container.classList.add('hidden');
                }

                document.getElementById('eventModal').classList.remove('hidden');
                // noinspection JSUnresolvedReference
                lucide.createIcons();
            }
        });

        // noinspection JSUnresolvedReference
        calendar.render();

        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    });
</script>
</body>
</html>
